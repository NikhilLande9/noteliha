name: noteliha
description: Cross-platform minimal notes application with offline-first and manual sync
publish_to: 'none'

version: 1.0.0+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_sign_in: ^6.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.10
  googleapis: ^16.0.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  provider: ^6.1.0
  uuid: ^4.0.0
  intl: ^0.19.0
  path_provider: ^2.1.0
  image_picker: ^1.0.0
  share_plus: ^7.2.0
  flutter_svg: ^2.0.10
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.0
  http: ^1.2.0
  in_app_update: ^4.2.3
  # ── User metadata (Firestore + device/app info) ──────────────────────────────
  cloud_firestore: ^5.0.0
  firebase_core: ^3.0.0
  firebase_crashlytics: ^4.0.0
  device_info_plus: ^10.0.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/noteliha.svg

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/noteliha.png"
  adaptive_icon_foreground: "assets/icons/noteliha.png"
  adaptive_icon_background: "#faf8f5"

flutter_native_splash:
  color: "#faf8f5"
  image: assets/icons/noteliha.png
  android: true
  ios: false
  android_gravity: center
  fullscreen: true